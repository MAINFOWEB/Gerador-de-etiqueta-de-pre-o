<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Etiquetas Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cor-fundo: #0d1117;
            --cor-destaque: #00d2ff;
            --cor-erro: #ff4d4d;
            --cor-sucesso: #28a745;
        }

        body { font-family: 'Roboto', sans-serif; background: var(--cor-fundo); color: white; display: flex; justify-content: center; padding: 20px; }
        .sistema { background: #fff; color: #333; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .botoes-margem { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .btn-m { padding: 10px; border: 1px solid #ccc; background: #eee; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn-m.ativo { background: var(--cor-destaque); color: white; border-color: var(--cor-destaque); }

        .acoes { display: flex; gap: 10px; margin-top: 20px; }
        .btn-acao { flex: 2; padding: 15px; background: #222; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-reset { flex: 1; padding: 15px; background: var(--cor-erro); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* DESIGN DA ETIQUETA DE PRATELEIRA */
        #area-impressao { margin-top: 30px; display: flex; flex-direction: column; align-items: center; }
        .etiqueta-final {
            width: 280px;
            border: 2px solid #000;
            padding: 10px;
            text-align: center;
            background: #fff;
            color: #000;
            margin-bottom: 15px;
        }
        .etiqueta-final .nome-prod { font-size: 20px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 5px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .etiqueta-final .preco-grande { font-size: 54px; font-weight: 900; margin: 5px 0; }
        .etiqueta-final .cod-visual { font-family: 'Libre Barcode 39'; font-size: 50px; line-height: 1; margin-top: 5px; }

        .btn-imprimir { width: 100%; padding: 15px; background: var(--cor-sucesso); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        @media print {
            body * { visibility: hidden; }
            #area-impressao, #area-impressao .etiqueta-final, #area-impressao .etiqueta-final * { visibility: visible; }
            #area-impressao { position: absolute; top: 0; left: 0; width: 100%; }
            .btn-imprimir { display: none; }
        }
    </style>
</head>
<body>

    <div class="sistema">
        <h2 style="text-align:center; margin-bottom: 20px;">Terminal de <span>Etiquetas on-line</span></h2>
        
        <div class="campo">
            <label>Código de Barras / PLU</label>
            <input type="text" id="input-codigo" oninput="buscarProduto()" placeholder="Aguardando bip ou digitação...">
            <p id="msg-produto" style="font-size: 13px; color: var(--cor-destaque); margin-top: 5px; font-weight: bold; min-height: 15px;"></p>
        </div>

        <div style="display:flex; gap:10px">
            <div class="campo" style="flex:1">
                <label>Custo Caixa (R$)</label>
                <input type="number" id="vlr-caixa" step="0.01">
            </div>
            <div class="campo" style="flex:1">
                <label>Unidades</label>
                <input type="number" id="qtd-caixa">
            </div>
        </div>

        <label>Margem de Lucro</label>
        <div class="botoes-margem">
            <button class="btn-m" onclick="setMargem(10, this)">10%</button>
            <button class="btn-m" onclick="setMargem(20, this)">20%</button>
            <button class="btn-m" onclick="setMargem(30, this)">30%</button>
            <button class="btn-m" onclick="setMargem(40, this)">40%</button>
            <button class="btn-m" onclick="setMargem(50, this)">50%</button>
        </div>

        <div class="acoes">
            <button class="btn-reset" onclick="limparTudo()">Zerar</button>
            <button class="btn-acao" onclick="gerarEtiqueta()">Gerar Etiqueta</button>
        </div>

        <div id="area-impressao">
            </div>
    </div>

    <script>
        const bancoProdutos = {
            "7891234567890": "Óleo de Soja 900ml",
            "7890001112223": "Arroz Agulhinha 5kg",
            "1010": "Detergente Neutro",
            "2020": "Feijão Carioca 1kg"
        };

        let margemGlobal = 0;
        let nomeProdutoAtivo = "";

        function buscarProduto() {
            const cod = document.getElementById('input-codigo').value;
            const display = document.getElementById('msg-produto');
            
            if (bancoProdutos[cod]) {
                nomeProdutoAtivo = bancoProdutos[cod];
                display.innerText = "✓ " + nomeProdutoAtivo;
            } else {
                nomeProdutoAtivo = cod; 
                display.innerText = cod ? "Código manual detectado." : "";
            }
        }

        function setMargem(valor, elemento) {
            margemGlobal = valor;
            document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('ativo'));
            elemento.classList.add('ativo');
        }

        function limparTudo() {
            document.getElementById('input-codigo').value = "";
            document.getElementById('vlr-caixa').value = "";
            document.getElementById('qtd-caixa').value = "";
            document.getElementById('msg-produto').innerText = "";
            document.getElementById('area-impressao').innerHTML = "";
            document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('ativo'));
            margemGlobal = 0;
            nomeProdutoAtivo = "";
            document.getElementById('input-codigo').focus();
        }

        function gerarEtiqueta() {
            const custo = parseFloat(document.getElementById('vlr-caixa').value);
            const qtd = parseInt(document.getElementById('qtd-caixa').value);
            const cod = document.getElementById('input-codigo').value;

            if (!nomeProdutoAtivo || !custo || !qtd || margemGlobal === 0) {
                alert("Preencha todos os campos e selecione a margem de lucro!"); 
                return;
            }

            const precoVenda = (custo / qtd) * (1 + margemGlobal/100);
            const container = document.getElementById('area-impressao');

            container.innerHTML = `
                <div class="etiqueta-final">
                    <div class="nome-prod">${nomeProdutoAtivo}</div>
                    <div style="font-size: 12px; margin-top: 10px; font-weight:bold;">PREÇO UNITÁRIO</div>
                    <div class="preco-grande">R$ ${precoVenda.toFixed(2).replace('.', ',')}</div>
                    <div class="cod-visual">${cod}</div>
                    <div style="font-size: 10px; font-weight:bold;">CÓDIGO: ${cod}</div>
                </div>
                <button class="btn-imprimir" onclick="window.print()">Imprimir Etiqueta</button>
            `;
        }
    </script>
</body>
</html>
