<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Etiquetas Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cor-fundo: #0d1117;
            --cor-destaque: #00d2ff;
        }

        body { font-family: 'Roboto', sans-serif; background: var(--cor-fundo); color: white; display: flex; justify-content: center; padding: 20px; }
        .sistema { background: #fff; color: #333; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; }
        
        .campo { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .botoes-margem { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .btn-m { padding: 10px; border: 1px solid #ccc; background: #eee; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn-m.ativo { background: var(--cor-destaque); color: white; }

        .btn-acao { width: 100%; padding: 15px; background: #222; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* DESIGN DA ETIQUETA DE PRATELEIRA (LIMPA) */
        #area-impressao { margin-top: 30px; display: flex; justify-content: center; }
        .etiqueta-final {
            width: 280px;
            border: 2px solid #000;
            padding: 10px;
            text-align: center;
            background: #fff;
            color: #000;
        }
        .etiqueta-final .nome-prod { font-size: 20px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .etiqueta-final .preco-grande { font-size: 54px; font-weight: 900; margin: 5px 0; }
        .etiqueta-final .cod-visual { font-family: 'Libre Barcode 39'; font-size: 50px; line-height: 1; }

        @media print {
            body * { visibility: hidden; }
            #area-impressao, #area-impressao * { visibility: visible; }
            #area-impressao { position: absolute; top: 0; left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sistema">
        <h2 style="text-align:center">Terminal <span>Precificador</span></h2>
        
        <div class="campo">
            <label>Bipe o Código (Barcode/PLU)</label>
            <input type="text" id="input-codigo" oninput="buscarProduto()" placeholder="Aguardando leitura...">
            <p id="msg-produto" style="font-size: 12px; color: #007bff; margin-top: 5px; font-weight: bold;"></p>
        </div>

        <div style="display:flex; gap:10px">
            <div class="campo">
                <label>Custo Caixa</label>
                <input type="number" id="vlr-caixa">
            </div>
            <div class="campo">
                <label>Unidades</label>
                <input type="number" id="qtd-caixa">
            </div>
        </div>

        <label>Margem de Lucro para Venda</label>
        <div class="botoes-margem">
            <button class="btn-m" onclick="setM(10, this)">10%</button>
            <button class="btn-m" onclick="setM(20, this)">20%</button>
            <button class="btn-m" onclick="setM(30, this)">30%</button>
            <button class="btn-m" onclick="setM(40, this)">40%</button>
            <button class="btn-m" onclick="setM(50, this)">50%</button>
        </div>

        <button class="btn-acao" onclick="gerar()">Gerar Etiqueta de Gôndola</button>

        <div id="area-impressao"></div>
    </div>

    <script>
        // BANCO DE DADOS (Simulado)
        const bancoProdutos = {
            "7891234567890": "Óleo de Soja 900ml",
            "7890001112223": "Arroz Agulhinha 5kg",
            "1010": "Detergente Neutro",
            "2020": "Feijão Carioca 1kg"
        };

        let margem = 0;
        let produtoEncontrado = "";

        function buscarProduto() {
            const cod = document.getElementById('input-codigo').value;
            const display = document.getElementById('msg-produto');
            
            if (bancoProdutos[cod]) {
                produtoEncontrado = bancoProdutos[cod];
                display.innerText = "PRODUTO: " + produtoEncontrado;
            } else {
                produtoEncontrado = cod; // Se não estiver no banco, usa o que foi digitado
                display.innerText = "Novo produto ou código manual.";
            }
        }

        function setM(v, el) {
            margem = v;
            document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('ativo'));
            el.classList.add('ativo');
        }

        function gerar() {
            const custo = parseFloat(document.getElementById('vlr-caixa').value);
            const qtd = parseInt(document.getElementById('qtd-caixa').value);

            if (!produtoEncontrado || !custo || !qtd || margem === 0) {
                alert("Preencha todos os dados!"); return;
            }

            const precoVenda = (custo / qtd) * (1 + margem/100);
            const area = document.getElementById('area-impressao');

            // Etiqueta Limpa para o Cliente
            area.innerHTML = `
                <div class="etiqueta-final">
                    <div class="nome-prod">${produtoEncontrado}</div>
                    <div style="font-size: 14px; margin-top: 10px;">PREÇO UNITÁRIO</div>
                    <div class="preco-grande">R$ ${precoVenda.toFixed(2).replace('.', ',')}</div>
                    <div class="cod-visual">${document.getElementById('input-codigo').value}</div>
                    <div style="font-size: 10px;">Cod: ${document.getElementById('input-codigo').value}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
